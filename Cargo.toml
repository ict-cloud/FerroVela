[package]
name = "ferrovela"
version = "0.3.0"
edition = "2021"

[dependencies]
# Core async runtime - using only needed features instead of 'full'
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net", "io-util", "macros"] }
bytes = "1"
serde = { version = "1", features = ["derive"] }
toml = "1.0"
log = "0.4"
anyhow = "1"
url = "2"
musli = { version = "0.0.149", features = ["serde", "alloc", "storage"] }
# For PAC file execution
boa_engine = "0.21"

clap = { version = "4.5", features = ["derive"] }
base64 = "0.22"

# Async HTTP client without blocking feature
reqwest = { version = "0.13", default-features = false, features = ["rustls"] }
iced = { version = "0.14", features = ["tokio"] }
libgssapi = { version = "0.9", default-features = false }
ntlmclient = "0.2.0"
tokio-stream = "0.1.18"
memchr = "2.8.0"
glob = "0.3.3"
async-trait = "0.1.89"
g3proxy = { git = "https://github.com/bytedance/g3.git", version = "1.13.0", default-features = false, features = ["vendored-c-ares"] }

[lib]
name = "ferrovela"
path = "src/lib.rs"

[[bin]]
name = "ferrovela"
path = "src/main.rs"

[profile.release]
opt-level = "s" # or "z"
codegen-units = 1
lto = "thin" #alternatives "fat" or "false"
strip = "debuginfo"

[dev-dependencies]
tempfile = "3.25.0"
criterion = { version = "0.8", features = ["async_tokio"] }

[[bench]]
name = "connect_bench"
harness = false

[[bench]]
name = "subsequence_bench"
harness = false
path = "benches/subsequence_bench.rs"

[[bench]]
name = "parse_content_length_bench"
harness = false
path = "benches/parse_content_length_bench.rs"

[[bench]]
name = "request_bench"
harness = false
path = "benches/request_bench.rs"

[[bench]]
name = "musli_vs_serde_bench"
harness = false
path = "benches/musli_vs_serde_bench.rs"

[[bench]]
name = "connect_bench_v2"
harness = false
path = "benches/connect_bench_v2.rs"
