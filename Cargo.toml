[package]
name = "ferrovela"
version = "0.1.3"
edition = "2021"

[dependencies]
# Core async runtime - using only needed features instead of 'full'
tokio = { version = "1", features = ["rt-multi-thread", "sync", "net", "io-util", "macros"] }
# HTTP server and client with minimal features
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio"] }
http-body-util = "0.1"
bytes = "1"
serde = { version = "1", features = ["derive"] }
toml = "1.0"
log = "0.4"
anyhow = "1"
url = "2"
# For PAC file execution
boa_engine = "0.21"

clap = { version = "4.5", features = ["derive"] }
base64 = "0.22"

# Async HTTP client without blocking feature
reqwest = { version = "0.13", default-features = false, features = ["rustls"] }
iced = { version = "0.14", features = ["tokio"] }
libgssapi = { version = "0.9", default-features = false }
ntlmclient = "0.2.0"
tokio-stream = "0.1.18"
memchr = "2.8.0"
glob = "0.3.3"

[dev-dependencies]
tempfile = "3.25.0"
criterion = { version = "0.8", features = ["async_tokio"] }

[[bench]]
name = "connect_bench"
harness = false

[[bench]]
name = "subsequence_bench"
harness = false
path = "benches/subsequence_bench.rs"

[lib]
name = "ferrovela"
path = "src/lib.rs"

[[bin]]
name = "ferrovela"
path = "src/main.rs"

[profile.release]
opt-level = "s" # or "z"
codegen-units = 1
lto = "thin" #alternatives "fat" or "false"
strip = "debuginfo"

[[bench]]
name = "parse_content_length_bench"
harness = false
path = "benches/parse_content_length_bench.rs"

[[bench]]
name = "request_bench"
harness = false
path = "benches/request_bench.rs"
