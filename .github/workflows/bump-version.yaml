name: "Bump Patch Version"

on:
  pull_request:
    branches:
      - "master"
    types:
      - closed

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version in Cargo.toml
        run: |
          CURRENT=$(awk -F '"' '/^version/ {print $2; exit}' Cargo.toml)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i "0,/^version = \"$CURRENT\"/s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" Cargo.toml
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Create pull request
        uses: actions/create-pull-request@v5
        with:
          branch: chore/bump-version-to-${{ env.NEW_VERSION }}
          commit-message: "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          title: "chore: bump version to ${{ env.NEW_VERSION }}"
          body: "Automated patch version bump after merge."
          base: master
